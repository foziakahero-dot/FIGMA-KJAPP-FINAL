name: Build iOS (TestFlight)

# iOS requires macOS runner. GitHub gives free macOS minutes on public repos;
# private repos consume 10x normal minutes — so prefer manual trigger.

on:
  workflow_dispatch:
  push:
    tags: ["ios-v*"]

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Sync Capacitor iOS
        run: |
          if [ ! -d "ios" ]; then
            pnpm exec cap add ios
          fi
          pnpm exec cap sync ios

      - name: Install Apple certificate + provisioning profile
        env:
          BUILD_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/build.keychain

          echo "$BUILD_CERT_BASE64" | base64 -d > "$CERT_PATH"
          echo "$PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive + export IPA
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -archivePath $RUNNER_TEMP/App.xcarchive \
            -allowProvisioningUpdates archive

          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ../ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER: ${{ secrets.APPSTORE_API_ISSUER }}
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY_BASE64" | base64 -d > \
            ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

          xcrun altool --upload-app -f $RUNNER_TEMP/export/App.ipa \
            --type ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER"
