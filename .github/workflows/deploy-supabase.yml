name: Deploy Supabase (migrations + functions)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push DB migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Function (server)
        run: supabase functions deploy server --no-verify-jwt

      - name: Set function secrets
        run: |
          supabase secrets set \
            GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            VIPPS_CLIENT_ID="${{ secrets.VIPPS_CLIENT_ID }}" \
            VIPPS_CLIENT_SECRET="${{ secrets.VIPPS_CLIENT_SECRET }}" \
            VIPPS_SUBSCRIPTION_KEY="${{ secrets.VIPPS_SUBSCRIPTION_KEY }}" \
            VIPPS_MERCHANT_SERIAL="${{ secrets.VIPPS_MERCHANT_SERIAL }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            LINKMOBILITY_USERNAME="${{ secrets.LINKMOBILITY_USERNAME }}" \
            LINKMOBILITY_PASSWORD="${{ secrets.LINKMOBILITY_PASSWORD }}"
